<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>RBPS Widget</title>
</head>
<body>
    <div id="widget-container">
        <div id="coin-sack">🪙</div>
        <div id="point-display">
            <div id="points">Points: 0</div>
            <div id="multiplier">Multiplier: x1</div> 
        </div>
    </div>
    <script> 

        function showFloatingPoints(amount){
            const floating = document.createElement('div');
            floating.classList.add('floating-points')
            floating.textContent = `+${amount}`
            document.getElementById('coin-sack').appendChild(floating);

            floating.addEventListener('animationend', () => {
                floating.remove();
            })
        }

        const socket = new WebSocket('ws://localhost:8080');
                                    
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('points').textContent = `Points: ${data.points}`;
            document.getElementById('multiplier').textContent = `Multiplier: x${data.multiplier}`;
            showFloatingPoints(data.gained);
        }
    </script>
</body>
</html>
